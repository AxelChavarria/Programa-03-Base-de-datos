<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Empleado</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body class="body-empleado">
    <header class="header">
        <button id="btnAtras" style="display:none;" class="form-btn">
            Atrás
        </button>
        <h1>Planilla semanal
        </h1>
        <button class="form-btn" id="btnCerrarSesion">
            Cerrar sesión
        </button>
    </header>

    <table>
        <thead>
            <tr>
                <th>Salario bruto</th>
                <th>Total de deducciones</th>
                <th>Salario neto</th>
                <th>Horas ordinarias</th>
                <th>Horas extra normales</th>
                <th>Horas extras dobles</th>
            </tr> 
        </thead>

        <tbody id="tabla-planilla-semanal">
        </tbody>
   </table>

    <div id="fondo"></div>

    <div id="cuadro">
        <h3>Información</h3>
        <p id="texto"></p>
        <button id="btn-cerrar">Cerrar</button>
    </div>

    
    <script type="module" src="main.js"></script>

</body>
</html>
